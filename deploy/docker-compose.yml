version: "3.9"

services:
  db:
    image: ankane/pgvector
    container_name: quickface-db
    environment:
      POSTGRES_DB: quickface
      POSTGRES_USER: quickface
      POSTGRES_PASSWORD: quickface
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: quickface-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: backend.Dockerfile
    container_name: quickface-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://quickface:quickface@db:5432/quickface
      REDIS_URL: redis://redis:6379/0
      # R2 credentials come from .env (STORAGE_ENDPOINT, STORAGE_ACCESS_KEY,
      # STORAGE_SECRET_KEY, STORAGE_BUCKET, R2_PUBLIC_DOMAIN)
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: backend.Dockerfile
    container_name: quickface-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://quickface:quickface@db:5432/quickface
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.tasks worker --loglevel=info -Q quickface

  frontend:
    build:
      context: ..
      dockerfile: frontend.Dockerfile
    container_name: quickface-frontend
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
