version: "3.9"

services:
  db:
    image: ankane/pgvector
    container_name: quickface-db
    environment:
      POSTGRES_DB: quickface
      POSTGRES_USER: quickface
      POSTGRES_PASSWORD: quickface
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  redis:
    image: redis:7
    container_name: quickface-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: quickface-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: backend.Dockerfile
    container_name: quickface-api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://quickface:quickface@db:5432/quickface
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: quickface-photos
      STORAGE_SECURE: "0"
    depends_on:
      - db
      - redis
      - minio
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: backend.Dockerfile
    container_name: quickface-worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://quickface:quickface@db:5432/quickface
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: quickface-photos
      STORAGE_SECURE: "0"
    depends_on:
      - db
      - redis
      - minio
    command: celery -A app.tasks worker --loglevel=info -Q quickface

  frontend:
    build:
      context: ..
      dockerfile: frontend.Dockerfile
    container_name: quickface-frontend
    env_file:
      - ../.env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
  minio_data:

